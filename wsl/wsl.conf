# dotfiles-Fedora/wsl/wsl.conf
# Installed to /etc/wsl.conf on WSL by bootstrap.sh (with __WSL_USER__ filled in).
# Apply changes by running, from a Windows terminal:  wsl.exe --shutdown
# then reopen the distro. NOTE: --shutdown restarts ALL your WSL distros.

[boot]
# Run systemd as PID 1 so services, timers, and `systemctl` behave like real Fedora.
systemd=true

[user]
# Land in this user (not root) on launch.
default=__WSL_USER__

[interop]
# Keep Windows interop on — this is what lets clip.exe / explorer.exe /
# powershell.exe work from inside WSL (your pbcopy/pbpaste shim depends on it).
enabled=true
appendWindowsPath=true

[network]
generateResolvConf=true
